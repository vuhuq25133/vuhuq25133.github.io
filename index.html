<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Frontend Practice Hub | vuhuq25133</title>
    <meta name="description" content="Nơi lưu trữ các dự án học tập và thực hành Frontend của Vũ Huy Quốc.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(17, 24, 39, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Background Glows */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(139, 92, 246, 0.05) 50%, rgba(0, 0, 0, 0) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
        }

        /* Header Styles */
        header {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            text-align: center;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        .hero-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Main Workspace */
        main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem 1.5rem 4rem;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 280px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 20px rgba(59, 130, 246, 0.1);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
        }

        .card-1 .badge {
            color: #60a5fa;
            border-color: rgba(96, 165, 250, 0.2);
            background: rgba(96, 165, 250, 0.05);
        }

        .card-2 .badge {
            color: #a78bfa;
            border-color: rgba(167, 139, 250, 0.2);
            background: rgba(167, 139, 250, 0.05);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #ffffff;
        }

        .card-desc {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .card-footer {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .card-2 .card-footer {
            color: var(--accent-purple);
        }

        .arrow {
            margin-left: 0.5rem;
            transition: transform 0.3s ease;
        }

        .card:hover .arrow {
            transform: translateX(6px);
        }

        /* Footer */
        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            font-size: 0.85rem;
            color: #6b7280;
        }

        footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #ffffff;
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            header {
                padding: 2rem 1rem;
            }

            .grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .card {
                padding: 1.8rem;
                min-height: auto;
            }
        }
    </style>
</head>

<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header>
        <div class="logo">vuhuq25133.github.io</div>
        <h1 class="hero-title">Frontend Practice Hub</h1>
    </header>

    <main>
        <div class="grid">
            <!-- Practice Card -->
            <a href="./practice/" class="card card-1" id="link-practice">
                <div class="card-content">
                    <span class="badge">Vanilla CSS</span>
                    <p class="card-desc">Xây dựng trang web bằng HTML CSS thuần</p>
                </div>
                <div class="card-footer">
                    Xem dự án <span class="arrow">→</span>
                </div>
            </a>

            <!-- Tailwind Practice Card -->
            <a href="./tailwind_practice/" class="card card-2" id="link-tailwind">
                <div class="card-content">
                    <span class="badge">Tailwind CSS</span>
                    <p class="card-desc">Xây dựng trang web bằng Tailwind CSS</p>
                </div>
                <div class="card-footer">
                    Xem dự án <span class="arrow">→</span>
                </div>
            </a>
        </div>
    </main>
</body>

</html>
